name: Wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  wheels:
    name: wheels / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux: native runners, no QEMU cross-build.
          - os: ubuntu-24.04
          - os: ubuntu-24.04-arm
          # Windows: amd64 only (win32/arm64 are skipped in pyproject.toml).
          # Pinned to 2022 (VS2022), not windows-latest/windows-2025, which
          # moved to VS2026 in June 2026 -- same rationale as pinning macOS
          # below: avoid a just-migrated, less-battle-tested toolchain.
          - os: windows-2022
          # macOS: two single-arch runners rather than one universal2 build.
          # macos-15 is pinned (not macos-latest, which has moved to 26) so
          # the arm64 deployment target below doesn't silently drift.
          - os: macos-15-intel
            # cibuildwheel enforces 10.15 as the floor for the Python
            # versions we build here; 10.13 is silently bumped to 10.15 with
            # a warning, so declare the real value instead.
            macosx_deployment_target: "10.15"
          - os: macos-15
            macosx_deployment_target: "11.0"
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v4.1.0
        env:
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.macosx_deployment_target }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*.whl

  sdist:
    name: sdist
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python -m pip install build
      - run: python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  publish:
    name: Publish to PyPI
    needs: [wheels, sdist]
    runs-on: ubuntu-24.04
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/gwm
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
